# Cloudflare Pages project config.
# Static site (HTML/CSS/JS/assets) is served from ./public — only that dir is
# deployed, so internal docs (*.md), supabase/ SQL, and config stay private.
# Functions live in ./functions at the project root (Pages requires this).
# The project name must match the Pages project you create in the dashboard.
name = "rg-tcg"
compatibility_date = "2025-08-01"
pages_build_output_dir = "public"

# NOTE: Secrets/env vars are NOT set here (this file is committed).
# Set them in the Cloudflare dashboard → your Pages project →
# Settings → Variables and Secrets (Production). See GO_LIVE.md.
